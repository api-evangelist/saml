name: SAML
description: SAML (Security Assertion Markup Language) is an XML-based open standard for exchanging authentication and authorization data between identity providers and service providers. It enables single sign-on (SSO) across different applications and domains, reducing the need for users to manage multiple sets of credentials.
url: https://en.wikipedia.org/wiki/Security_Assertion_Markup_Language
tags:
  - Authentication
  - Identity Management
  - Security
  - SSO
created: '2025'
modified: '2025'
apis:
  - name: SAML 2.0 SSO HTTP Bindings API
    description: >-
      API specification for SAML 2.0 Single Sign-On HTTP bindings including the
      HTTP Redirect Binding and HTTP POST Binding for AuthnRequest and Response
      exchange, Assertion Consumer Service, Single Logout, and metadata retrieval
      as defined in the OASIS SAML 2.0 Bindings specification.
    properties:
      - type: x-openapi
        url: openapi/saml-sso-bindings.yml
common:
  - type: x-json-schema
    url: json-schema/saml-entity-descriptor.json
    title: SAML 2.0 EntityDescriptor Metadata
  - type: x-json-schema
    url: json-schema/saml-authn-request.json
    title: SAML 2.0 AuthnRequest
  - type: x-json-schema
    url: json-schema/saml-assertion.json
    title: SAML 2.0 Assertion
  - type: x-json-ld-context
    url: json-ld/saml-context.jsonld
    title: SAML 2.0 JSON-LD Context
