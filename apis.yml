name: SAML
description: SAML (Security Assertion Markup Language) is an XML-based open standard
  for exchanging authentication and authorization data between identity providers
  and service providers. It enables single sign-on (SSO) across different applications
  and domains, reducing the need for users to manage multiple sets of credentials.
